# Сборка и публикация образа в Container Registry инстанса GitLab.
# После создания проекта в GitLab переменные CI_REGISTRY, CI_REGISTRY_IMAGE и т.д.
# подставляются автоматически (реестр: gitlabacr.aplanadc.ru).
#
# Требуется runner с доступом в интернет (executor: docker или Kubernetes).

stages:
  - build

build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_JOB_TOKEN}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - |
      DESTINATIONS="--destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY_IMAGE}:latest"
      if [ -n "$CI_COMMIT_TAG" ]; then
        DESTINATIONS="${DESTINATIONS} --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
      fi
      /kaniko/executor
        --context "${CI_PROJECT_DIR}"
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
        ${DESTINATIONS}
        --cache=true
        --compressed-caching=false
